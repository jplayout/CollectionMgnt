name: Publish Container Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  backend-check:
    name: Backend check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Check JavaScript syntax
        working-directory: backend
        run: find src -name '*.js' -print0 | xargs -0 -n1 node --check

  frontend-check:
    name: Frontend check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm exec vite build

  publish:
    name: Publish images
    runs-on: ubuntu-latest
    needs:
      - backend-check
      - frontend-check

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare image names
        run: |
          IMAGE_OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_OWNER=${IMAGE_OWNER}" >> "${GITHUB_ENV}"
          echo "BACKEND_IMAGE=ghcr.io/${IMAGE_OWNER}/collectionmgnt-backend" >> "${GITHUB_ENV}"
          echo "FRONTEND_IMAGE=ghcr.io/${IMAGE_OWNER}/collectionmgnt-frontend" >> "${GITHUB_ENV}"

      - name: Prepare image tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BACKEND_TAGS="${BACKEND_IMAGE}:sha-${SHORT_SHA}"
          FRONTEND_TAGS="${FRONTEND_IMAGE}:sha-${SHORT_SHA}"

          echo "GITHUB_EVENT_NAME=${GITHUB_EVENT_NAME}"
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME}"

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            BACKEND_TAGS="${BACKEND_TAGS}"$'\n'"${BACKEND_IMAGE}:latest"
            FRONTEND_TAGS="${FRONTEND_TAGS}"$'\n'"${FRONTEND_IMAGE}:latest"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BACKEND_TAGS="${BACKEND_TAGS}"$'\n'"${BACKEND_IMAGE}:${GITHUB_REF_NAME}"
            FRONTEND_TAGS="${FRONTEND_TAGS}"$'\n'"${FRONTEND_IMAGE}:${GITHUB_REF_NAME}"
          fi

          echo "Generated backend tags:"
          printf '%s\n' "${BACKEND_TAGS}" | sed 's/^/  /'
          echo "Generated frontend tags:"
          printf '%s\n' "${FRONTEND_TAGS}" | sed 's/^/  /'

          {
            echo "BACKEND_TAGS<<EOF"
            printf '%s\n' "${BACKEND_TAGS}"
            echo "EOF"
            echo "FRONTEND_TAGS<<EOF"
            printf '%s\n' "${FRONTEND_TAGS}"
            echo "EOF"
          } >> "${GITHUB_ENV}"

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.BACKEND_TAGS }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.FRONTEND_TAGS }}
