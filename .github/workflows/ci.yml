name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Check JavaScript syntax
        working-directory: backend
        run: npm run check:syntax

      - name: Run backend tests
        working-directory: backend
        run: npm test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm exec vite build

  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check whitespace
        run: git diff --check

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - quality

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Pull base images with retry
        run: |
          for image in node:22 nginx:1.27-alpine; do
            for attempt in 1 2 3 4 5; do
              if docker pull "${image}"; then
                break
              fi

              if [ "${attempt}" = "5" ]; then
                exit 1
              fi

              sleep $((attempt * 10))
            done
          done

      - name: Build backend image
        run: docker build -t collectionmgnt-backend ./backend

      - name: Build frontend image
        run: docker build -t collectionmgnt-frontend ./frontend
